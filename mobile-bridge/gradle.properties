org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8 -Djava.net.preferIPv4Stack=true
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
# Build machine is a 14GB container shared with VS Code + AI services. The default
# setup spawns a SEPARATE Kotlin daemon JVM on top of gradle's, and the sum gets
# OOM-killed mid-compile (the process dies with no error logged). Run Kotlin in-process
# and cap workers/parallelism so the whole build fits inside one bounded JVM.
kotlin.compiler.execution.strategy=in-process
org.gradle.daemon=false
org.gradle.parallel=false
org.gradle.workers.max=2
org.gradle.configureondemand=false
